<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: black; /* Arka plan siyah */
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 5%; /* Yukarıdan boşluk bırak */
            left: 0;
            width: 100vw;  /* Genişlik ekranın %100’ü */
            height: 90vh;  /* Yukarıdan ve aşağıdan boşlukla birlikte %90 yükseklik */
            object-fit: cover; /* Videoyu ekranı dolduracak şekilde kırp */
        }
    </style>
</head>
<body>

    <video autoplay loop controls>
        <source src="Shrek plays the Saxophone.mp4" type="video/mp4">
        Tarayıcınız video etiketini desteklemiyor.
    </video>

</body>
</html>
