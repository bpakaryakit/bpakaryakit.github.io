<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>a</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        video {
            position: absolute;
            left: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <video autoplay loop playsinline control>
        <source src="Shrek plays the Saxophone.mp4" type="video/mp4">
        Yuh.
    </video>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.querySelector('video');
            video.play().catch(error => {
                console.log("Video otomatik başlatılamadı:", error);
            });
        });
    </script>

</body>
</html>
