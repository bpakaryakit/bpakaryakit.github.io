<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piramitsel Video Tasarımı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background: #111; /* Koyu arka plan */
        }

        .video-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%) rotateX(30deg) scale(0.9); /* Piramit eğimi */
            perspective: 1000px; 
            overflow: hidden;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform: rotateX(-20deg); /* Videoyu geriye eğerek piramit perspektifini güçlendirme */
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 1)); /* Piramit etkisi için degrade */
            pointer-events: none; /* Kullanıcı tıklamaları arka plandaki videoya gider */
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/jKf6S5XI8Ew?autoplay=1&mute=1&loop=1&playlist=jKf6S5XI8Ew" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
        <div class="overlay"></div> <!-- Piramit efekti için yarı saydam katman -->
    </div>

</body>
</html>
